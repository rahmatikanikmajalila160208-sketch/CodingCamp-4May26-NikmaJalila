<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo Life Dashboard</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header class="app-header">
      <button id="theme-toggle" type="button" aria-label="Toggle dark mode">🌙 Dark</button>
    </header>
    <main class="dashboard-grid">

      <!-- Greeting Widget -->
      <section id="greeting" class="widget widget--greeting">
        <p id="greeting-time"></p>
        <p id="greeting-date"></p>
        <div class="greeting-message-row">
          <p id="greeting-message"></p>
          <button id="greeting-edit-btn" type="button" aria-label="Edit name">✏️</button>
        </div>
        <div id="greeting-name-form" hidden>
          <input id="greeting-name-input" type="text" placeholder="Your name" maxlength="50" autocomplete="off" />
          <button id="greeting-name-save" type="button">Save</button>
          <button id="greeting-name-clear" type="button">Clear</button>
        </div>
      </section>

      <!-- Focus Timer Widget -->
      <section id="timer" class="widget widget--timer">
        <div id="timer-display">25:00</div>
        <div class="timer-controls">
          <button id="timer-start" type="button">Start</button>
          <button id="timer-stop" type="button">Stop</button>
          <button id="timer-reset" type="button">Reset</button>
        </div>
        <div class="timer-duration-row">
          <label for="timer-duration-input">Duration (min):</label>
          <input id="timer-duration-input" type="number" min="1" max="60" value="25" />
          <button id="timer-duration-set" type="button">Set</button>
        </div>
        <p id="timer-duration-error" class="error-message" aria-live="polite"></p>
      </section>

      <!-- Quick Links Widget -->
      <section id="links" class="widget widget--links">
        <div id="links-panel"></div>
        <form id="links-form" novalidate>
          <label for="link-label">Label</label>
          <input id="link-label" type="text" placeholder="e.g. GitHub" autocomplete="off" />
          <label for="link-url">URL</label>
          <input id="link-url" type="url" placeholder="https://example.com" autocomplete="off" />
          <button type="submit">Add Link</button>
          <p id="links-error" role="alert" aria-live="polite"></p>
        </form>
      </section>

      <!-- To-Do List Widget -->
      <section id="todos" class="widget widget--todos">
        <ul id="todo-list"></ul>
        <form id="todo-form">
          <input
            id="todo-input"
            type="text"
            placeholder="Add a new task…"
            autocomplete="off"
            aria-label="New task description"
          />
          <button type="submit">Add Task</button>
        </form>
      </section>

    </main>
    <script src="js/app.js"></script>
  </body>
</html>
